# Hugo configuration — carvalhosauro.github.io
baseURL: "https://carvalhosauro.github.io/"
title: "carvalhosauro"
enableRobotsTXT: true
enableEmoji: true

defaultContentLanguage: pt-br
defaultContentLanguageInSubdir: true

outputs:
  home: [HTML, RSS]

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

languages:
  pt-br:
    languageCode: pt-br
    languageName: Português
    label: PT
    locale: pt-BR
    weight: 1
    contentDir: content/pt-br
    title: carvalhosauro
    params:
      description: "Referência técnica em construção — engenharia, carreira e leituras curadas."
      microcopy:
        heroEyebrow: "Diário técnico"
        heroTitle: "carvalhosauro"
        heroSubtitle: "Diário técnico"
        exploreTitle: "Por onde começar"
        footerTagline: "Um post por vez."
        footerAside: "Escrito por mim, revisado por mim. Os erros também são meus."
    menu:
      main:
        - name: Sobre
          pageRef: /sobre
          weight: 1
        - name: Leituras
          pageRef: /leituras
          weight: 2
        - name: RSS
          weight: 3
          url: "/pt-br/index.xml"
          params:
            icon: rss
        - name: GitHub
          weight: 4
          url: "https://github.com/carvalhosauro"
          params:
            icon: github
        - name: Buscar
          weight: 5
          params:
            type: search
        - name: Idioma
          weight: 6
          params:
            type: language-switch
            label: false
        - name: Tema
          weight: 7
          params:
            type: theme-toggle

  en:
    languageCode: en
    languageName: English
    label: EN
    locale: en
    weight: 2
    contentDir: content/en
    title: carvalhosauro
    params:
      description: "Technical reference under construction — engineering, career, and curated reading."
      microcopy:
        heroEyebrow: "Tech journal"
        heroTitle: "carvalhosauro"
        heroSubtitle: "Tech journal"
        exploreTitle: "Start here"
        footerTagline: "One post at a time."
        footerAside: "Written by me, reviewed by me. The mistakes are mine too."
    menu:
      main:
        - name: About
          pageRef: /about
          weight: 1
        - name: Reading
          pageRef: /reading
          weight: 2
        - name: RSS
          weight: 3
          url: "/en/index.xml"
          params:
            icon: rss
        - name: GitHub
          weight: 4
          url: "https://github.com/carvalhosauro"
          params:
            icon: github
        - name: Search
          weight: 5
          params:
            type: search
        - name: Language
          weight: 6
          params:
            type: language-switch
            label: false
        - name: Theme
          weight: 7
          params:
            type: theme-toggle

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  theme:
    default: light
    displayToggle: true

  search:
    enable: true
    type: flexsearch

  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
      pagerSize: 10

  article:
    displayPagination: true

  archives:
    section: posts
    dateFormat: "02 Jan 2006"

  page:
    width: normal

  author:
    name: carvalhosauro
    email: ""

  editURL:
    enable: false
